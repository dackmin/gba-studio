name: Extract Vendors
run-name: Extract ${{ inputs.vendor }}

on:
  workflow_dispatch:
    inputs:
      vendor:
        description: 'Vendor name'
        required: true
        type: choice
        default: 'devkitPro'
        options:
          - devkitPro
          - python
  
jobs:
  extract:
    name: Extract Vendor
    fail-fast: false
    strategy:
      matrix:
        include:
          - name: macOS
            label: darwin
            os: macos-26
          - name: Windows
            label: win32
            os: windows-latest
          - name: Linux
            label: linux
            os: ubuntu-24.04
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
          check-latest: true
      - name: Install devkitPro (linux)
        if: matrix.label == 'linux' && inputs.vendor == 'devkitPro'
        run: |
          docker pull devkitpro/devkitarm:20260610
          sudo mkdir -p /opt/devkitpro
          docker run --rm devkitpro/devkitarm:20260610 tar -C /opt -cf - devkitpro | sudo tar -C /opt -xf -
      - name: Install dependencies
        run: yarn install
      - name: Extract Vendor
        run: yarn bundle:${{ inputs.vendor }}
      - name: Upload Vendor Archive
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.vendor }}-${{ matrix.label }}.tar.gz
          path: public/vendors/${{ inputs.vendor }}/${{ matrix.label }}.tar.gz
