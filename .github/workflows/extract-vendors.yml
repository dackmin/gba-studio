name: Extract Vendors
run-name: Extract ${{ inputs.vendor }}

on:
  workflow_dispatch:
    inputs:
      vendor:
        description: 'Vendor name'
        required: true
        type: choice
        default: 'devkitPro'
        options:
          - devkitPro
          - python
  
jobs:
  extract:
    name: Extract Vendor
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            label: darwin
            os: macos-26
          - name: Windows
            label: win32
            os: windows-latest
          - name: Linux
            label: linux
            os: ubuntu-24.04
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
          check-latest: true
      - name: Install devkitPro (linux)
        if: matrix.label == 'linux' && inputs.vendor == 'devkitPro'
        run: |
          docker pull devkitpro/devkitarm:20260610
          sudo mkdir -p /opt/devkitpro
          docker run --rm devkitpro/devkitarm:20260610 tar -C /opt -cf - devkitpro | sudo tar -C /opt -xf -
      - name: Setup MSYS2 (windows)
        if: matrix.label == 'win32' && inputs.vendor == 'devkitPro'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          install: tar
      - name: Install devkitPro (windows)
        if: matrix.label == 'win32' && inputs.vendor == 'devkitPro'
        shell: msys2 {0}
        run: |
          pacman-key --recv BC26F752D25B92CE272E0F44F7FD5492264BB9D0 --keyserver keyserver.ubuntu.com
          pacman-key --lsign BC26F752D25B92CE272E0F44F7FD5492264BB9D0
          pacman -U --noconfirm https://pkg.devkitpro.org/devkitpro-keyring.pkg.tar.zst
          pacman-key --populate devkitpro
          cat >> /etc/pacman.conf <<'EOF'

          [dkp-libs]
          Server = https://pkg.devkitpro.org/packages

          [dkp-windows]
          Server = https://pkg.devkitpro.org/packages/windows/$arch/
          EOF
          pacman -Sy --noconfirm
          pacman -S --noconfirm gba-dev
          mkdir -p /c/devkitPro
          tar -C /opt/devkitpro -cf - . | tar -C /c/devkitPro -xf -
      - name: Install devkitPro (macOS)
        if: matrix.label == 'darwin' && inputs.vendor == 'devkitPro'
        run: |
          wget -qO "$RUNNER_TEMP/devkitpro-pacman-installer.pkg" https://github.com/devkitPro/pacman/releases/download/v6.0.2/devkitpro-pacman-installer.pkg
          sudo installer -pkg "$RUNNER_TEMP/devkitpro-pacman-installer.pkg" -target /
          sudo dkp-pacman -Sy --noconfirm
          sudo dkp-pacman -S --noconfirm gba-dev
      - name: Install dependencies
        run: yarn install
      - name: Extract Vendor
        run: yarn bundle:${{ inputs.vendor }}
      - name: Upload Vendor Archive
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.vendor }}-${{ matrix.label }}.tar.gz
          path: public/vendors/${{ inputs.vendor }}/${{ matrix.label }}.tar.gz
