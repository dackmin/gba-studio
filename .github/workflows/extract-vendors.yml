name: Extract Vendors

on:
  workflow_dispatch:
    inputs:
      vendor:
        description: 'Vendor name'
        required: true
        type: choice
        default: 'devkitPro'
        options:
          - devkitPro
          - python
  push:
    branches:
      - feature/portable-build
  
jobs:
  extract:
    name: Extract Vendor
    strategy:
      matrix:
        include:
          # - name: macOS
          #   label: darwin
          #   os: macos-26
          # - name: Windows
          #   label: win32
          #   os: windows-latest
          - name: Linux
            label: linux
            os: ubuntu-24.04
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
          check-latest: true
      - name: Install vendors (linux)
        if: matrix.label == 'linux' && inputs.vendor == 'devkitPro'
        run: |
          wget -U "dkp-apt" https://apt.devkitpro.org/install-devkitpro-pacman
          chmod +x ./install-devkitpro-pacman
          sudo ./install-devkitpro-pacman
          sudo dkp-pacman -Syu
          sudo dkp-pacman -S gba-dev
      - name: Install dependencies
        run: yarn install
      - name: Extract Vendor
        run: yarn bundle:${{ inputs.vendor }}
      - name: Upload Vendor Archive
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.vendor }}-${{ matrix.label }}
          path: public/vendors/${{ inputs.vendor }}/${{ matrix.label }}.tar.gz
